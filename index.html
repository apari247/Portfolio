<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APR — Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #080b11;
    --bg2:      #0d1117;
    --surface:  #131925;
    --border:   rgba(0, 220, 255, 0.12);
    --text:     #e8edf5;
    --muted:    #7a8aaa;
    --cyan:     #00d4ff;
    --blue:     #3b6ef5;
    --glow-c:   rgba(0, 212, 255, 0.18);
    --glow-b:   rgba(59, 110, 245, 0.12);
  }

  html, body {
    height: 100%;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 80px 24px 100px;
  }

  /* layered background glow */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%,   rgba(0,180,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 20% 80%,  rgba(59,110,245,0.06) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 80% 70%,  rgba(0,212,255,0.04) 0%, transparent 55%);
    pointer-events: none;
  }

  /* subtle grid lines */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 0%, transparent 70%);
  }

  /* ── CONTENT ── */
  .hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 1000px;
    width: 100%;
    gap: 0;
  }

  /* ── BADGE ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 212, 255, 0.07);
    border: 1px solid rgba(0, 212, 255, 0.22);
    border-radius: 100px;
    padding: 7px 18px 7px 14px;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--cyan);
    letter-spacing: 0.02em;
    margin-bottom: 36px;
    backdrop-filter: blur(8px);
    opacity: 0;
    animation: riseIn 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
  }

  .badge-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    flex-shrink: 0;
    animation: pulse 2.4s ease-in-out infinite;
  }

  /* ── HEADLINE ── */
  .headline {
    font-size: clamp(2.8rem, 8.5vw, 7.8rem);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -0.035em;
    margin-bottom: 28px;
    opacity: 0;
    animation: riseIn 0.75s cubic-bezier(0.22,1,0.36,1) 0.25s forwards;
  }

  .line1 {
    display: block;
    color: #dde8f5;
    margin-bottom: 4px;
  }

  .line2 {
    display: block;
    background: linear-gradient(95deg, #00d4ff 0%, #38b6ff 35%, #3b6ef5 75%, #6b5ef5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(0,180,255,0.35));
  }

  /* ── SUBTEXT ── */
  .subtext {
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    color: var(--muted);
    max-width: 520px;
    line-height: 1.75;
    margin-bottom: 44px;
    font-weight: 400;
    opacity: 0;
    animation: riseIn 0.65s cubic-bezier(0.22,1,0.36,1) 0.45s forwards;
  }

  .subtext strong {
    color: #b0bdd4;
    font-weight: 600;
  }

  /* ── BUTTONS ── */
  .buttons {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: riseIn 0.65s cubic-bezier(0.22,1,0.36,1) 0.6s forwards;
  }

  .btn-primary {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 14px 32px;
    background: linear-gradient(135deg, #00c8f5 0%, #0099e5 50%, #3b6ef5 100%);
    color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.01em;
    box-shadow:
      0 0 24px rgba(0,180,255,0.35),
      0 4px 16px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.15);
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    border-radius: inherit;
    pointer-events: none;
  }

  .btn-primary:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow:
      0 0 36px rgba(0,180,255,0.5),
      0 8px 24px rgba(0,0,0,0.35),
      inset 0 1px 0 rgba(255,255,255,0.2);
    filter: brightness(1.08);
  }

  .btn-primary:active { transform: translateY(0) scale(0.99); }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 14px 32px;
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 0.01em;
    backdrop-filter: blur(8px);
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
  }

  .btn-secondary:hover {
    transform: translateY(-2px);
    border-color: rgba(0, 212, 255, 0.4);
    background: rgba(0, 212, 255, 0.06);
    color: #c8e8f8;
  }

  .btn-secondary:active { transform: translateY(0); }

  /* ── ANIMATIONS ── */
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1;   transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.8); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .buttons {
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .btn-primary,
    .btn-secondary {
      width: 100%;
      max-width: 320px;
      justify-content: center;
    }
    .headline {
      letter-spacing: -0.025em;
    }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-content">

    <!-- Badge -->
    <div class="badge">
      <span class="badge-dot"></span>
      Available for freelance &amp; projects
    </div>

    <!-- Headline -->
    <h1 class="headline">
      <span class="line1">Trading Bots, Chatbots</span>
      <span class="line2">&amp; Software Built to Perform</span>
    </h1>

    <!-- Subtext -->
    <p class="subtext">
      Hi, I'm <strong>APR</strong> a developer specializing in automated trading systems,
      intelligent chatbots, and custom software solutions. I build tools that work while you sleep.
    </p>

    <!-- Buttons -->
    <div class="buttons">
      <a href="#projects" class="btn-primary">View My Work →</a>
      <a href="#contact" class="btn-secondary">Get In Touch</a>
    </div>

  </div>
</section>

</body>
</html>
